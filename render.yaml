services:
  - type: web
    name: frescoop-api
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js --api-only
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_DB
        value: frescoop
      - key: FRESCOOP_SEED_MODE
        value: none
      - key: CORS_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: FRESCOOP_ADMIN_EMAILS
        sync: false
      - key: FRESCOOP_ADMIN_PASSWORD_HASH
        sync: false
      - key: FRESCOOP_DEMO_PASSWORD_HASH
        sync: false
      - key: FRESCOOP_MOBILE_DEMO_PASSWORD_HASH
        sync: false
      - key: PAYDUNYA_MODE
        sync: false
      - key: PAYDUNYA_MASTER_KEY
        sync: false
      - key: PAYDUNYA_PRIVATE_KEY
        sync: false
      - key: PAYDUNYA_TOKEN
        sync: false
      - key: PAYDUNYA_STORE_NAME
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODELS
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: frescoop-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://frescoop-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /manifest.webmanifest
        name: Content-Type
        value: application/manifest+json
      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=0, must-revalidate
