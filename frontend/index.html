<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a4b3e" />
    <meta name="description" content="FresCoop — plateforme agri-fintech UEMOA : traçabilité, anti-gaspi, paiement partenaire et bancabilité." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>FresCoop UEMOA — Du champ au paiement, la preuve qui finance</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isViteDevServer = location.port.startsWith('517');
          if (isViteDevServer) {
            navigator.serviceWorker.getRegistrations()
              .then((registrations) => registrations.forEach((registration) => registration.unregister()))
              .catch(() => {});
            return;
          }
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
