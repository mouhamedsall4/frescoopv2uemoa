<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Identite FresCoop</title>
  <desc id="desc">Identite FresCoop avec feuilles, QR code, marche agricole et slogan Vendre Tracer Prouver.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="64%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#fdfefe"/>
      <stop offset="1" stop-color="#f3f5f3"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#178b5d"/>
      <stop offset="0.58" stop-color="#0d6c3d"/>
      <stop offset="1" stop-color="#073f24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d29a42"/>
      <stop offset="1" stop-color="#b97821"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="13" stdDeviation="15" flood-color="#062f27" flood-opacity=".13"/>
    </filter>
    <style>
      .dark{fill:#075331}
      .leaf{fill:url(#leaf)}
      .line{fill:none;stroke:#075331;stroke-width:15;stroke-linecap:round;stroke-linejoin:round}
      .white-line{fill:none;stroke:#fff;stroke-width:17;stroke-linecap:round;stroke-linejoin:round}
      .qr{fill:#075331}
      .gold{fill:url(#gold)}
      .word{font:900 96px Arial, Helvetica, sans-serif;fill:#075331}
      .tag{font:700 27px Arial, Helvetica, sans-serif;fill:#075331}
    </style>
  </defs>

  <rect width="900" height="900" fill="url(#bg)"/>

