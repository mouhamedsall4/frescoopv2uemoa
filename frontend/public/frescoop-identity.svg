    <rect fill="#fff" x="41" y="122" width="26" height="26"/>
    <rect class="qr" x="46" y="127" width="16" height="16"/>
    <rect class="qr" x="104" y="29" width="25" height="44"/>
    <rect class="qr" x="143" y="29" width="16" height="16"/>
    <rect class="qr" x="104" y="91" width="17" height="17"/>
    <rect class="qr" x="132" y="91" width="31" height="17"/>
    <rect class="qr" x="105" y="122" width="27" height="40"/>
